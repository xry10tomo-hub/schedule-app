<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブラウザ通知イメージ</title>
<style>
  body {
    margin: 0;
    background: #f0f0f0;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h2 { color: #333; margin-bottom: 30px; }
  .desktop-bg {
    position: relative;
    width: 700px;
    height: 420px;
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 44px;
    background: rgba(30,30,30,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .taskbar-icon {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
  }
  .taskbar-time {
    position: absolute;
    right: 12px;
    color: #ccc;
    font-size: 12px;
    text-align: right;
    line-height: 1.3;
  }
  .window {
    position: absolute;
    top: 20px;
    left: 30px;
    width: 400px;
    height: 280px;
    background: #fff;
    border-radius: 8px 8px 0 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .window-bar {
    height: 32px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    border-bottom: 1px solid #e0e0e0;
  }
  .window-dot { width: 10px; height: 10px; border-radius: 50%; }
  .window-content {
    padding: 16px;
    font-size: 13px;
    color: #666;
  }
  .window-content h3 { margin: 0 0 8px 0; color: #333; font-size: 15px; }

  /* Windows 11 style notification */
  .notification {
    position: absolute;
    bottom: 56px;
    right: 16px;
    width: 340px;
    background: #2d2d2d;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: #fff;
    overflow: hidden;
    animation: slideUp 0.4s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .notif-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 14px 0 14px;
  }
  .notif-icon {
    width: 20px; height: 20px;
    background: #22c55e;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .notif-app { font-size: 11px; color: #999; }
  .notif-body { padding: 10px 14px 14px 14px; }
  .notif-title { font-size: 13px; font-weight: 700; color: #ff6b6b; margin-bottom: 6px; }
  .notif-text { font-size: 12px; color: #ddd; line-height: 1.6; }
  .notif-text b { color: #fff; }
  .notif-actions {
    display: flex;
    border-top: 1px solid #444;
  }
  .notif-actions div {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .notif-actions div:first-child { color: #88b4f5; border-right: 1px solid #444; }
  .notif-actions div:last-child { color: #aaa; }

  .arrow-label {
    position: absolute;
    bottom: 70px;
    right: 370px;
    color: #d32f2f;
    font-size: 15px;
    font-weight: bold;
    white-space: nowrap;
  }
  .arrow-label::after {
    content: '→';
    margin-left: 6px;
    font-size: 20px;
  }
</style>
</head>
<body>
  <h2>ブラウザ通知のイメージ（Windows 11）</h2>
  <div class="desktop-bg">
    <!-- Simulated open window (Excel etc) -->
    <div class="window">
      <div class="window-bar">
        <div class="window-dot" style="background:#ff5f56"></div>
        <div class="window-dot" style="background:#ffbd2e"></div>
        <div class="window-dot" style="background:#27c93f"></div>
        <span style="margin-left:10px;font-size:12px;color:#888">Excel - 在庫管理表.xlsx</span>
      </div>
      <div class="window-content">
        <h3>他の作業中でも通知が届きます</h3>
        <p>スケジュールアプリを開いていなくても、<br>ブラウザのタブが1つ開いていれば<br>デスクトップ右下に通知が表示されます。</p>
      </div>
    </div>

    <div class="arrow-label">この通知が自動で出る</div>

    <!-- Windows 11 Notification -->
    <div class="notification">
      <div class="notif-header">
        <div class="notif-icon">📅</div>
        <span class="notif-app">スケジュール管理アプリ · Chrome</span>
      </div>
      <div class="notif-body">
        <div class="notif-title">⚠️ 業務遅延アラート</div>
        <div class="notif-text">
          <b>潮田さん</b>：「買取査定」が予定時刻<br>（10:00）を15分超過しています。<br>実績を入力してください。
        </div>
      </div>
      <div class="notif-actions">
        <div>アプリを開く</div>
        <div>閉じる</div>
      </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
      <div class="taskbar-icon"></div>
      <div class="taskbar-icon"></div>
      <div class="taskbar-icon"></div>
      <div class="taskbar-icon"></div>
      <div class="taskbar-time">10:15<br>2026/04/13</div>
    </div>
  </div>
  <p style="margin-top:20px;color:#888;font-size:13px">※ 実際のWindows通知はこのようなイメージでデスクトップ右下に表示されます</p>
</body>
</html>
